<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlintPrime - Links</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background(1).gif'); 
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            image-rendering: pixelated; 
        }

        .vignette-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.1) 100%);
            z-index: -1;
            pointer-events: none; 
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;
            max-height: 90vh; 
            z-index: 1;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            object-fit: cover;
            image-rendering: pixelated;
            flex-shrink: 0; 
        }

        h1 { 
            font-size: 26px; 
            margin: 0 0 25px 0;
            text-shadow: 2px 2px 4px #000, 0 0 15px #0055ff;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .links-container { 
            width: 100%; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto; 
            padding: 5px;
        }
        
        .links-container::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* הגדרת האנימציה ההולוגרפית לריחוף */
        @keyframes holoShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card {
            background: rgba(10, 10, 15, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 14px 20px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            border: 1px solid #0055ff;
            box-shadow: 0 0 8px rgba(0, 85, 255, 0.3);
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 17px;
            backdrop-filter: blur(4px);
            flex-shrink: 0; 
            /* חשוב כדי שהאנימציה לא תחרוג מהכפתור */
            overflow: hidden; 
        }

        .link-icon {
            position: absolute;
            right: 15px; 
            width: 28px;
            height: 28px;
            image-rendering: pixelated; 
            /* מוודא שהאייקון נשאר מעל הרקע הזוז */
            z-index: 2; 
        }
        
        .link-text {
            /* מוודא שהטקסט נשאר מעל הרקע הזוז */
            z-index: 2; 
        }

        /* אפקטי ריחוף (Hover) עם רקע הולוגרפי זז */
        
        .discord-link:hover { 
            background: linear-gradient(90deg, rgba(10,10,15,0.9), rgba(138,159,255,0.6), rgba(10,10,15,0.9), rgba(138,159,255,0.4));
            background-size: 300% 300%;
            animation: holoShine 3s ease infinite;
            border-color: #8a9fff;
            box-shadow: 0 0 15px rgba(138, 159, 255, 0.7);
        }

        .kick-link:hover { 
            background: linear-gradient(90deg, rgba(10,10,15,0.9), rgba(9,255,0,0.5), rgba(10,10,15,0.9), rgba(9,255,0,0.3));
            background-size: 300% 300%;
            animation: holoShine 3s ease infinite;
            border-color: #09ff00;
            box-shadow: 0 0 15px rgba(9, 255, 0, 0.7);
        }

        .youtube-link:hover { 
            background: linear-gradient(90deg, rgba(10,10,15,0.9), rgba(255,31,31,0.6), rgba(10,10,15,0.9), rgba(255,31,31,0.4));
            background-size: 300% 300%;
            animation: holoShine 3s ease infinite;
            border-color: #ff1f1f;
            box-shadow: 0 0 15px rgba(255, 31, 31, 0.7);
        }

        .tiktok-link:hover { 
            background: linear-gradient(90deg, rgba(10,10,15,0.9), rgba(255,56,106,0.6), rgba(10,10,15,0.9), rgba(255,56,106,0.4));
            background-size: 300% 300%;
            animation: holoShine 3s ease infinite;
            border-color: #ff386a;
            box-shadow: 0 0 15px rgba(255, 56, 106, 0.7);
        }

        .instagram-link:hover { 
            background: linear-gradient(90deg, rgba(10,10,15,0.9), rgba(255,114,54,0.6), rgba(10,10,15,0.9), rgba(255,114,54,0.4));
            background-size: 300% 300%;
            animation: holoShine 3s ease infinite;
            border-color: #ff7236;
            box-shadow: 0 0 15px rgba(255, 114, 54, 0.7);
        }

        .x-link:hover { 
            /* כאן הוספתי גוון מעט מטאלי כי שחור ייבלע ברקע */
            background: linear-gradient(90deg, rgba(10,10,15,0.9), rgba(100,100,100,0.5), rgba(10,10,15,0.9), rgba(80,80,80,0.4));
            background-size: 300% 300%;
            animation: holoShine 3s ease infinite;
            border-color: #ffffff; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div class="vignette-layer"></div>

    <div class="content-container">
        <img src="FlintOM-Animated.gif" alt="FlintPrime Profile" class="profile-img">

        <h1>FlintPrime</h1>

        <div class="links-container">
            
            <a href="https://discord.gg/discord.com/invite/p2hSdzAdRu" target="_blank" class="link-card discord-link">
                <!-- שמות הקבצים תוקנו בדיוק לפי התמונה שהעלית -->
                <img src="discord_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">דיסקורד</span>
            </a>

            <a href="https://kick.com/flintprime" target="_blank" class="link-card kick-link">
                <img src="kick_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">קיק</span>
            </a>

            <a href="https://youtube.com/@FlintPr1me" target="_blank" class="link-card youtube-link">
                <img src="youtube_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">יוטיוב</span>
            </a>

            <a href="https://tiktok.com/@flintprime" target="_blank" class="link-card tiktok-link">
                <img src="tiktok_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">טיקטוק</span>
            </a>

            <a href="https://instagram.com/FlintPrime" target="_blank" class="link-card instagram-link">
                <img src="instagram_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">אינסטגרם</span>
            </a>

            <a href="https://x.com/FlintPr1me" target="_blank" class="link-card x-link">
                <img src="xtwitter_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">X (טוויטר)</span>
            </a>

        </div>
    </div>

</body>
</html>
