<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlintPrime - Links</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background(1).gif'); 
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            image-rendering: pixelated; 
        }

        .vignette-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.25) 100%);
            z-index: -1;
            pointer-events: none; 
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 420px; 
            max-height: 90vh; 
            z-index: 1;
            background: rgba(10, 10, 15, 0.45); 
            border-radius: 24px; 
            padding: 35px 20px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            object-fit: cover;
            image-rendering: pixelated;
            flex-shrink: 0; 
        }

        h1 { 
            font-size: 26px; 
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px #000, 0 0 15px #0055ff;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .links-container { 
            width: 100%; 
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto; 
            padding: 10px 5px;
        }
        
        .links-container::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        @keyframes floatIdle {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        @keyframes holoShine {
            0% { background-position: 0% 50%; transform: scale(1.02); }
            50% { background-position: 100% 50%; transform: scale(1.02); }
            100% { background-position: 0% 50%; transform: scale(1.02); }
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 14px 20px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 17px;
            flex-shrink: 0; 
            overflow: hidden; 
            animation: floatIdle 4s ease-in-out infinite;
            /* הוסר ה-blur מכיוון שהכפתור אטום לחלוטין עכשיו */
        }

        .link-card:nth-child(1) { animation-delay: 0.0s; }
        .link-card:nth-child(2) { animation-delay: 0.2s; }
        .link-card:nth-child(3) { animation-delay: 0.4s; }
        .link-card:nth-child(4) { animation-delay: 0.6s; }
        .link-card:nth-child(5) { animation-delay: 0.8s; }
        .link-card:nth-child(6) { animation-delay: 1.0s; }

        .link-icon {
            position: absolute;
            left: 15px; 
            width: 38px; 
            height: 38px; 
            image-rendering: pixelated; 
            z-index: 2; 
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .link-text {
            z-index: 2; 
        }

        /* --- עיצוב כפתורים אינדיבידואלי במצב רגיל (אטום לחלוטין, ללא שקיפות) --- */
        
        .discord-link { 
            background: linear-gradient(90deg, #121218, #28325a); 
            border: 1px solid rgba(138,159,255,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(138, 159, 255, 0.15);
        }
        .discord-link .link-icon { filter: drop-shadow(0 0 6px rgba(138,159,255,0.8)); }

        .kick-link { 
            background: linear-gradient(90deg, #121218, #164210); 
            border: 1px solid rgba(9,255,0,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(9, 255, 0, 0.15);
        }
        .kick-link .link-icon { filter: drop-shadow(0 0 6px rgba(9,255,0,0.8)); }

        .youtube-link { 
            background: linear-gradient(90deg, #121218, #4a1414); 
            border: 1px solid rgba(255,31,31,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 31, 31, 0.15);
        }
        .youtube-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,31,31,0.8)); }

        .tiktok-link { 
            background: linear-gradient(90deg, #121218, #4a1827); 
            border: 1px solid rgba(255,56,106,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 56, 106, 0.15);
        }
        .tiktok-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,56,106,0.8)); }

        .instagram-link { 
            background: linear-gradient(90deg, #121218, #4a2514); 
            border: 1px solid rgba(255,114,54,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 114, 54, 0.15);
        }
        .instagram-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,114,54,0.8)); }

        .x-link { 
            background: linear-gradient(90deg, #121218, #323232); 
            border: 1px solid rgba(255,255,255,0.3); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 255, 255, 0.1);
        }
        .x-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }


        /* --- אפקטי ריחוף אטומים (האנימציה נדלקת!) --- */

        .discord-link:hover { 
            background: linear-gradient(90deg, #121218, #40508c, #121218, #2d3a68);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite; 
            border-color: #8a9fff;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(138, 159, 255, 0.7);
        }
        .discord-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(138,159,255,1)); transform: scale(1.05); }

        .kick-link:hover { 
            background: linear-gradient(90deg, #121218, #246b1a, #121218, #1a4a12);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #09ff00;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(9, 255, 0, 0.7);
        }
        .kick-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(9,255,0,1)); transform: scale(1.05); }

        .youtube-link:hover { 
            background: linear-gradient(90deg, #121218, #7a2020, #121218, #5c1818);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ff1f1f;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 31, 31, 0.7);
        }
        .youtube-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,31,31,1)); transform: scale(1.05); }

        .tiktok-link:hover { 
            background: linear-gradient(90deg, #121218, #7a2840, #121218, #5c1e30);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ff386a;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 56, 106, 0.7);
        }
        .tiktok-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,56,106,1)); transform: scale(1.05); }

        .instagram-link:hover { 
            background: linear-gradient(90deg, #121218, #7a3d20, #121218, #5c2d18);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ff7236;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 114, 54, 0.7);
        }
        .instagram-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,114,54,1)); transform: scale(1.05); }

        .x-link:hover { 
            background: linear-gradient(90deg, #121218, #555555, #121218, #404040);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ffffff; 
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 255, 255, 0.5);
        }
        .x-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,255,255,0.8)); transform: scale(1.05); }

        .footer-credits {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85); 
            letter-spacing: 0.5px;
            line-height: 1.6;
            flex-shrink: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div class="vignette-layer"></div>

    <div class="content-container">
        <img src="FlintOM-Animated.gif" alt="FlintPrime Profile" class="profile-img">

        <h1>FlintPrime</h1>

        <div class="links-container">
            
            <a href="https://discord.gg/discord.com/invite/p2hSdzAdRu" target="_blank" class="link-card discord-link">
                <img src="discord_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">דיסקורד</span>
            </a>

            <a href="https://kick.com/flintprime" target="_blank" class="link-card kick-link">
                <img src="kick_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">קיק</span>
            </a>

            <a href="https://youtube.com/@FlintPr1me" target="_blank" class="link-card youtube-link">
                <img src="youtube_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">יוטיוב</span>
            </a>

            <a href="https://tiktok.com/@flintprime" target="_blank" class="link-card tiktok-link">
                <img src="tiktok_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">טיקטוק</span>
            </a>

            <a href="https://instagram.com/FlintPrime" target="_blank" class="link-card instagram-link">
                <img src="instagram_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">אינסטגרם</span>
            </a>

            <a href="https://x.com/FlintPr1me" target="_blank" class="link-card x-link">
                <img src="xtwitter_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">X (טוויטר)</span>
            </a>

        </div>

        <div class="footer-credits">
            &copy; 2026 FlintPrime<br>
            Created by FlintPrime
        </div>

    </div>

</body>
</html>
