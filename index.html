<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlintPrime - Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* שימוש בגיף הרקע שהעלית */
            background-image: url('background(1).gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 15px;
            /* מסגרת עם אפקט תאורה כחולה */
            border: 3px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            object-fit: cover;
        }

        h1 { 
            font-size: 28px; 
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000, 0 0 15px #0055ff;
            letter-spacing: 1px;
        }

        .links-container { 
            width: 100%; 
            max-width: 400px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            /* רקע שחור חצי-שקוף כדי שהטקסט יהיה קריא על הרקע הזז */
            background: rgba(10, 10, 15, 0.85);
            display: block;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            /* גבול כחול בסגנון RGB */
            border: 1px solid #0055ff;
            box-shadow: 0 0 10px rgba(0, 85, 255, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 18px;
            backdrop-filter: blur(4px);
        }

        .link-card:hover { 
            transform: translateY(-3px) scale(1.02); 
            background: rgba(0, 85, 255, 0.15); 
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.8);
            color: #fff;
        }
    </style>
</head>
<body>

    <img src="FlintOM-Animated.gif" alt="FlintPrime Profile" class="profile-img">

    <h1>FlintPrime</h1>

    <div class="links-container">
        <a href="https://discord.gg/discord.com/invite/p2hSdzAdRu" target="_blank" class="link-card">Discord</a>
        <a href="https://kick.com/flintprime" target="_blank" class="link-card">Kick</a>
        <a href="https://youtube.com/@FlintPr1me" target="_blank" class="link-card">YouTube</a>
        <a href="https://tiktok.com/@flintprime" target="_blank" class="link-card">TikTok</a>
        <a href="https://instagram.com/FlintPrime" target="_blank" class="link-card">Instagram</a>
        <a href="https://x.com/FlintPr1me" target="_blank" class="link-card">X (Twitter)</a>
    </div>

</body>
</html>
