<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקישורים שלי</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; color: #333; }
        .links-container { width: 100%; max-width: 400px; }
        .link-card {
            background: white;
            display: block;
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: #333;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            font-weight: bold;
        }
        .link-card:hover { transform: scale(1.02); background: #eee; }
    </style>
</head>
<body>

    <!-- תמונת פרופיל (אופציונלי) -->
    <img src="https://github.com/YOUR_USERNAME.png" alt="Profile" class="profile-img">

    <h1>השם שלך כאן</h1>

    <div class="links-container">
        <a href="https://linkedin.com/in/YOUR_PROFILE" class="link-card">LinkedIn</a>
        <a href="https://github.com/YOUR_USERNAME" class="link-card">GitHub</a>
        <a href="mailto:your-email@example.com" class="link-card">צור קשר במייל</a>
        <!-- אפשר להוסיף עוד קישורים כאן -->
    </div>

</body>
</html>
