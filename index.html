<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlintPrime - Links</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #05050a; /* רקע שחור-כחלחל עמוק */
        }

        /* קנבס החלקיקים ברקע */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; 
            background-color: #05050a; 
        }

        /* השחרת קצוות להבלטת המרכז והאורות */
        .vignette-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 20%, rgba(0,0,0,0.6) 100%);
            z-index: 1; 
            pointer-events: none; 
        }

        /* מלבן הזכוכית המרכזי */
        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 420px; 
            max-height: 90vh; 
            position: relative; 
            z-index: 2; 
            background: rgba(10, 10, 15, 0.45); 
            border-radius: 24px; 
            padding: 35px 20px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            object-fit: cover;
            image-rendering: pixelated;
            flex-shrink: 0; 
        }

        h1 { 
            font-size: 26px; 
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px #000, 0 0 15px #0055ff;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .links-container { 
            width: 100%; 
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto; 
            padding: 10px 5px;
        }
        
        .links-container::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* אנימציות */
        @keyframes floatIdle {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        @keyframes holoShine {
            0% { background-position: 0% 50%; transform: scale(1.02); }
            50% { background-position: 100% 50%; transform: scale(1.02); }
            100% { background-position: 0% 50%; transform: scale(1.02); }
        }

        /* עיצוב בסיסי לכפתורים */
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 14px 20px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 17px;
            flex-shrink: 0; 
            overflow: hidden; 
            animation: floatIdle 4s ease-in-out infinite;
        }

        /* השהיית אנימציה ליצירת אפקט גל */
        .link-card:nth-child(1) { animation-delay: 0.0s; }
        .link-card:nth-child(2) { animation-delay: 0.2s; }
        .link-card:nth-child(3) { animation-delay: 0.4s; }
        .link-card:nth-child(4) { animation-delay: 0.6s; }
        .link-card:nth-child(5) { animation-delay: 0.8s; }
        .link-card:nth-child(6) { animation-delay: 1.0s; }

        .link-icon {
            position: absolute;
            left: 15px; 
            width: 38px; 
            height: 38px; 
            image-rendering: pixelated; 
            z-index: 2; 
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .link-text {
            z-index: 2; 
        }

        /* --- עיצוב כפתורים אטומים (מצב רגיל) --- */
        
        .discord-link { 
            background: linear-gradient(90deg, #121218, #28325a); 
            border: 1px solid rgba(138,159,255,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(138, 159, 255, 0.15);
        }
        .discord-link .link-icon { filter: drop-shadow(0 0 6px rgba(138,159,255,0.8)); }

        .kick-link { 
            background: linear-gradient(90deg, #121218, #164210); 
            border: 1px solid rgba(9,255,0,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(9, 255, 0, 0.15);
        }
        .kick-link .link-icon { filter: drop-shadow(0 0 6px rgba(9,255,0,0.8)); }

        .youtube-link { 
            background: linear-gradient(90deg, #121218, #4a1414); 
            border: 1px solid rgba(255,31,31,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 31, 31, 0.15);
        }
        .youtube-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,31,31,0.8)); }

        .tiktok-link { 
            background: linear-gradient(90deg, #121218, #4a1827); 
            border: 1px solid rgba(255,56,106,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 56, 106, 0.15);
        }
        .tiktok-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,56,106,0.8)); }

        .instagram-link { 
            background: linear-gradient(90deg, #121218, #4a2514); 
            border: 1px solid rgba(255,114,54,0.5); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 114, 54, 0.15);
        }
        .instagram-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,114,54,0.8)); }

        .x-link { 
            background: linear-gradient(90deg, #121218, #323232); 
            border: 1px solid rgba(255,255,255,0.3); 
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.35), inset 0 0 8px rgba(255, 255, 255, 0.1);
        }
        .x-link .link-icon { filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }

        /* --- אפקטי ריחוף (אנימציה נדלקת וניאון מתחזק) --- */

        .discord-link:hover { 
            background: linear-gradient(90deg, #121218, #40508c, #121218, #2d3a68);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite; 
            border-color: #8a9fff;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(138, 159, 255, 0.7);
        }
        .discord-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(138,159,255,1)); transform: scale(1.05); }

        .kick-link:hover { 
            background: linear-gradient(90deg, #121218, #246b1a, #121218, #1a4a12);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #09ff00;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(9, 255, 0, 0.7);
        }
        .kick-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(9,255,0,1)); transform: scale(1.05); }

        .youtube-link:hover { 
            background: linear-gradient(90deg, #121218, #7a2020, #121218, #5c1818);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ff1f1f;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 31, 31, 0.7);
        }
        .youtube-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,31,31,1)); transform: scale(1.05); }

        .tiktok-link:hover { 
            background: linear-gradient(90deg, #121218, #7a2840, #121218, #5c1e30);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ff386a;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 56, 106, 0.7);
        }
        .tiktok-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,56,106,1)); transform: scale(1.05); }

        .instagram-link:hover { 
            background: linear-gradient(90deg, #121218, #7a3d20, #121218, #5c2d18);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ff7236;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 114, 54, 0.7);
        }
        .instagram-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,114,54,1)); transform: scale(1.05); }

        .x-link:hover { 
            background: linear-gradient(90deg, #121218, #555555, #121218, #404040);
            background-size: 300% 300%;
            animation: holoShine 2.5s ease infinite;
            border-color: #ffffff; 
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 255, 255, 0.5);
        }
        .x-link:hover .link-icon { filter: drop-shadow(0 0 12px rgba(255,255,255,0.8)); transform: scale(1.05); }

        /* פוטר */
        .footer-credits {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85); 
            letter-spacing: 0.5px;
            line-height: 1.6;
            flex-shrink: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <!-- קנבס ליצירת חלקיקי הנצנצים/כוכבים -->
    <canvas id="bg-canvas"></canvas>
    
    <div class="vignette-layer"></div>

    <div class="content-container">
        <img src="FlintOM-Animated.gif" alt="FlintPrime Profile" class="profile-img">

        <h1>FlintPrime</h1>

        <div class="links-container">
            <a href="https://discord.gg/discord.com/invite/p2hSdzAdRu" target="_blank" class="link-card discord-link">
                <img src="discord_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">דיסקורד</span>
            </a>
            <a href="https://kick.com/flintprime" target="_blank" class="link-card kick-link">
                <img src="kick_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">קיק</span>
            </a>
            <a href="https://youtube.com/@FlintPr1me" target="_blank" class="link-card youtube-link">
                <img src="youtube_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">יוטיוב</span>
            </a>
            <a href="https://tiktok.com/@flintprime" target="_blank" class="link-card tiktok-link">
                <img src="tiktok_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">טיקטוק</span>
            </a>
            <a href="https://instagram.com/FlintPrime" target="_blank" class="link-card instagram-link">
                <img src="instagram_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">אינסטגרם</span>
            </a>
            <a href="https://x.com/FlintPr1me" target="_blank" class="link-card x-link">
                <img src="xtwitter_icon_bg.png" alt="" class="link-icon">
                <span class="link-text">X (טוויטר)</span>
            </a>
        </div>

        <div class="footer-credits">
            &copy; 2026 FlintPrime<br>
            Created by FlintPrime
        </div>

    </div>

    <!-- סקריפט לחלקיקי הכוכבים המנצנצים -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let mouse = {
            x: null,
            y: null,
            radius: 120 
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });
        
        window.addEventListener('touchend', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init(); 
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                // העוגן שאליו החלקיק תמיד ירצה לחזור (אבל העוגן עצמו משוטט לאט לאט)
                this.baseX = this.x;
                this.baseY = this.y;
                
                // תנועה חופשית איטית ועדינה מאוד
                this.directionX = (Math.random() - 0.5) * 0.35; 
                this.directionY = (Math.random() - 0.5) * 0.35;
                
                // גודל הליבה (קטן, כדי שיראה כמו כוכב ולא עיגול ענק)
                this.size = Math.random() * 1.2 + 0.8; 
                
                // משתני הנצנוץ
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.03 + 0.01;
                
                // צבע ההילה - ניאון חזק בתכלת וכחול
                this.glowColor = Math.random() > 0.5 ? '#00d2ff' : '#0055ff';
            }

            draw() {
                // חישוב הנצנוץ הנוכחי (הגודל של ההילה משתנה בפעימות)
                this.twinklePhase += this.twinkleSpeed;
                let currentGlow = Math.abs(Math.sin(this.twinklePhase)) * 25 + 15; // ההילה תהיה בין 15 ל-40 פיקסלים

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                
                // ציור ראשון: הילה ענקית מסביב
                ctx.fillStyle = '#ffffff'; // ליבה לבנה כמו כוכב אולטרה-בוהק
                ctx.shadowBlur = currentGlow; 
                ctx.shadowColor = this.glowColor;
                ctx.fill();
                
                // ציור שני: מוריד את הטשטוש כדי לצייר את הנקודה הלבנה חדה באמצע
                ctx.shadowBlur = 0;
                ctx.fill();
            }

            update() {
                // שוטטות העוגן בקצוות - אם מגיע לקצה, הופך כיוון כדי לא לברוח
                if (this.baseX > canvas.width || this.baseX < 0) this.directionX = -this.directionX;
                if (this.baseY > canvas.height || this.baseY < 0) this.directionY = -this.directionY;

                // הזזת עוגן השיוט באופן חופשי ומתמיד
                this.baseX += this.directionX;
                this.baseY += this.directionY;

                // אינטראקציה עם העכבר
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    // הדיפה אלסטית עדינה החוצה מהעכבר
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = forceDirectionX * force * 1.5; // כוח הדיפה עדין יותר
                    let directionY = forceDirectionY * force * 1.5;
                    
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // משיכה רכה מאוד בחזרה לנקודת העוגן שמשוטטת (נותן את האפקט האלסטי/נוזלי)
                    this.x -= (this.x - this.baseX) / 30;
                    this.y -= (this.y - this.baseY) / 30;
                }

                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            // קצת פחות חלקיקים כדי שהנצנוץ הגדול לא יעמיס על העין (וכדי שיעבוד חלק גם בטלפון)
            let numberOfParticles = (canvas.width * canvas.height) / 8000;
            if(numberOfParticles > 120) numberOfParticles = 120; 
            
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            // טיפונת שקיפות בניקוי הקנבס נותן תחושה חלקה עוד יותר לתנועה
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
