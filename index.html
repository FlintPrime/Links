<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlintPrime - Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* שימוש במיקום יחסי כדי לאפשר את שכבות הרקע מעל לבודי */
            position: relative;
        }

        /* שכבת הרקע - הגיף עם אפקט הפיקסלציה (Mosaic) */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background(1).gif');
            background-size: cover;
            background-position: center;
            z-index: -2;
            /* הפילטר שיוצר מראה מפוקסל/פסיפס */
            image-rendering: pixelated; 
        }

        /* שכבת ההצללה (Vignette) בקצוות */
        .vignette-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* מעבר צבע רדיאלי שקוף באמצע ושחור בקצוות */
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
            pointer-events: none; /* כדי שהשכבה לא תפריע ללחיצות */
        }

        /* התוכן המרכזי */
        .content-container {
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 1;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            object-fit: cover;
            /* רצוי להגדיר גם כאן pixelated אם תמונת הפרופיל היא פיקסל ארט */
            image-rendering: pixelated;
        }

        h1 { 
            font-size: 28px; 
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000, 0 0 15px #0055ff;
            letter-spacing: 1px;
        }

        .links-container { 
            width: 100%; 
            max-width: 400px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(10, 10, 15, 0.85);
            display: flex;
            align-items: center;
            /* מרווח פנימי מעודכן כדי לתמוך באייקון */
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            border: 1px solid #0055ff;
            box-shadow: 0 0 10px rgba(0, 85, 255, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 18px;
            backdrop-filter: blur(4px);
        }

        /* עיצוב האייקונים בתוך הכפתורים */
        .link-icon {
            width: 32px;
            height: 32px;
            /* מרווח שמאלי לאייקון (כי האתר מוגדר כ-RTL - מימין לשמאל) */
            margin-left: 15px; 
            image-rendering: pixelated; /* שמירה על מראה הפיקסל ארט */
        }
        
        .link-text {
            flex-grow: 1;
            text-align: center;
            /* מזיז מעט את הטקסט ימינה כדי לפצות על האייקון ולמרכז את הטקסט */
            margin-right: 32px; 
        }

        /* אפקטי ריחוף (Hover) עם הצבעים המותאמים אישית */
        
        /* Discord */
        .discord-link:hover { 
            background: rgba(138, 159, 255, 0.2); 
            border-color: #8a9fff;
            box-shadow: 0 0 20px rgba(138, 159, 255, 0.8);
        }

        /* Kick */
        .kick-link:hover { 
            background: rgba(9, 255, 0, 0.2); 
            border-color: #09ff00;
            box-shadow: 0 0 20px rgba(9, 255, 0, 0.8);
        }

        /* YouTube */
        .youtube-link:hover { 
            background: rgba(255, 31, 31, 0.2); 
            border-color: #ff1f1f;
            box-shadow: 0 0 20px rgba(255, 31, 31, 0.8);
        }

        /* TikTok */
        .tiktok-link:hover { 
            background: rgba(255, 56, 106, 0.2); 
            border-color: #ff386a;
            box-shadow: 0 0 20px rgba(255, 56, 106, 0.8);
        }

        /* Instagram */
        .instagram-link:hover { 
            background: rgba(255, 114, 54, 0.2); 
            border-color: #ff7236;
            box-shadow: 0 0 20px rgba(255, 114, 54, 0.8);
        }

        /* X */
        .x-link:hover { 
            background: rgba(48, 48, 48, 0.8); 
            border-color: #ffffff; /* בחרתי לבן למסגרת כי שחור ייבלע ברקע הכהה */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

    </style>
</head>
<body>

    <!-- שכבות הרקע -->
    <div class="background-layer"></div>
    <div class="vignette-layer"></div>

    <!-- תוכן האתר -->
    <div class="content-container">
        <!-- תמונת פרופיל מונפשת -->
        <img src="FlintOM-Animated.gif" alt="FlintPrime Profile" class="profile-img">

        <h1>FlintPrime</h1>

        <div class="links-container">
            
            <!-- Discord -->
            <a href="https://discord.gg/discord.com/invite/p2hSdzAdRu" target="_blank" class="link-card discord-link">
                <img src="discord.png" alt="Discord Icon" class="link-icon">
                <span class="link-text">Discord</span>
            </a>

            <!-- Kick -->
            <a href="https://kick.com/flintprime" target="_blank" class="link-card kick-link">
                <img src="kick.png" alt="Kick Icon" class="link-icon">
                <span class="link-text">Kick</span>
            </a>

            <!-- YouTube -->
            <a href="https://youtube.com/@FlintPr1me" target="_blank" class="link-card youtube-link">
                <img src="youtube.png" alt="YouTube Icon" class="link-icon">
                <span class="link-text">YouTube</span>
            </a>

            <!-- TikTok -->
            <a href="https://tiktok.com/@flintprime" target="_blank" class="link-card tiktok-link">
                <img src="tiktok.png" alt="TikTok Icon" class="link-icon">
                <span class="link-text">TikTok</span>
            </a>

            <!-- Instagram -->
            <a href="https://instagram.com/FlintPrime" target="_blank" class="link-card instagram-link">
                <img src="instagram.png" alt="Instagram Icon" class="link-icon">
                <span class="link-text">Instagram</span>
            </a>

            <!-- X -->
            <a href="https://x.com/FlintPr1me" target="_blank" class="link-card x-link">
                <img src="x.png" alt="X Icon" class="link-icon">
                <span class="link-text">X (Twitter)</span>
            </a>

        </div>
    </div>

</body>
</html>
